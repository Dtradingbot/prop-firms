name: Deploy to Hostinger Cloud

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 65002
          script: |
            cd ~/propfirmhub

            echo ">>> Pulling latest code..."
            git pull origin master

            echo ">>> Backend build..."
            cd backend
            npm install --legacy-peer-deps
            npx prisma generate
            npx prisma migrate deploy
            npm run build

            echo ">>> Frontend build..."
            cd ../frontend
            npm install --legacy-peer-deps
            npm run build

            echo ">>> Restarting app..."
            pm2 restart propfirmhub-api --update-env
            pm2 restart propfirmhub-web --update-env

            echo ">>> Done!"
